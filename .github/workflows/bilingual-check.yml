name: Bilingual Docs Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'en/**'
      - 'zh/**'

# Only needs read on contents and write on PR comments
permissions:
  contents: read
  pull-requests: write

jobs:
  docs-check:
    name: Check zh/en content parity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          # Compare PR branch against the base branch
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "$BASE" "$HEAD" > /tmp/changed_files.txt
          echo "--- Changed files ---"
          cat /tmp/changed_files.txt

      - name: Analyse parity and build report
        id: report
        run: |
          python3 - <<'PYEOF'
          import os, sys, re

          changed = open("/tmp/changed_files.txt").read().splitlines()
          changed = [f for f in changed if f.startswith("en/") or f.startswith("zh/")]

          # ── Separate into en/zh buckets (strip leading lang prefix) ──────────
          en_files = set()
          zh_files = set()
          for f in changed:
              if f.startswith("en/"):
                  en_files.add(f[3:])   # relative path after lang prefix
              elif f.startswith("zh/"):
                  zh_files.add(f[3:])

          all_rel = en_files | zh_files

          ok, missing_en, missing_zh = [], [], []

          for rel in sorted(all_rel):
              has_en = os.path.exists(f"en/{rel}")
              has_zh = os.path.exists(f"zh/{rel}")
              in_en_changed = rel in en_files
              in_zh_changed = rel in zh_files

              if not has_en:
                  missing_en.append(f"`en/{rel}` — file does not exist yet")
              elif not in_en_changed:
                  missing_en.append(f"`en/{rel}` — not updated in this PR")

              if not has_zh:
                  missing_zh.append(f"`zh/{rel}` — file does not exist yet")
              elif not in_zh_changed:
                  missing_zh.append(f"`zh/{rel}` — not updated in this PR")

              if (has_en and in_en_changed) and (has_zh and in_zh_changed):
                  ok.append(rel)

          # ── Build section-level diff summary for changed .md pairs ───────────
          def extract_headings(path):
              try:
                  lines = open(path).read().splitlines()
                  return [l.strip() for l in lines if re.match(r"^#{1,4} ", l)]
              except Exception:
                  return []

          heading_issues = []
          for rel in ok:
              h_en = extract_headings(f"en/{rel}")
              h_zh = extract_headings(f"zh/{rel}")
              if len(h_en) != len(h_zh):
                  heading_issues.append(
                      f"`{rel}`: EN has {len(h_en)} heading(s), ZH has {len(h_zh)} heading(s)"
                  )

          # ── Write summary ─────────────────────────────────────────────────────
          lines = []

          # Status badge
          has_issues = missing_en or missing_zh or heading_issues
          badge = "⚠️ Some files need attention" if has_issues else "✅ All changed files have both zh and en counterparts"
          lines.append(f"## 📄 Bilingual Docs Check\n")
          lines.append(f"{badge}\n")

          # Changed files summary table
          lines.append("### Changed files in this PR\n")
          lines.append("| File | EN | ZH |")
          lines.append("|------|----|----|")
          for rel in sorted(all_rel):
              has_en_flag = "✅" if (os.path.exists(f"en/{rel}") and rel in en_files) else ("📁" if os.path.exists(f"en/{rel}") else "❌")
              has_zh_flag = "✅" if (os.path.exists(f"zh/{rel}") and rel in zh_files) else ("📁" if os.path.exists(f"zh/{rel}") else "❌")
              lines.append(f"| `{rel}` | {has_en_flag} | {has_zh_flag} |")
          lines.append("")
          lines.append("> ✅ updated in this PR &nbsp; 📁 exists but not updated &nbsp; ❌ file missing\n")

          # Issues section
          if missing_zh:
              lines.append("### 🔴 Missing / not updated — ZH side\n")
              for m in missing_zh:
                  lines.append(f"- {m}")
              lines.append("")

          if missing_en:
              lines.append("### 🔴 Missing / not updated — EN side\n")
              for m in missing_en:
                  lines.append(f"- {m}")
              lines.append("")

          if heading_issues:
              lines.append("### ⚠️ Heading count mismatch (possible structural drift)\n")
              for h in heading_issues:
                  lines.append(f"- {h}")
              lines.append("")

          if not has_issues:
              lines.append("No parity issues detected. 🎉\n")

          lines.append("---")
          lines.append("_This check is informational and does not block merging._")

          report = "\n".join(lines)
          print(report)

          # Write to file for next step
          with open("/tmp/report.md", "w") as f:
              f.write(report)
          PYEOF

      - name: Generate doc engineering suggestions
        run: |
          python3 - <<'PYEOF'
          import os, re

          changed = open("/tmp/changed_files.txt").read().splitlines()
          changed = [f for f in changed if f.startswith("en/") or f.startswith("zh/")]

          en_files = [f for f in changed if f.startswith("en/") and f.endswith(".md")]
          zh_files = [f for f in changed if f.startswith("zh/") and f.endswith(".md")]

          # ── Rule-based doc engineering checks ────────────────────────────────

          def analyse(path, lang):
              try:
                  text = open(path, encoding="utf-8").read()
              except Exception:
                  return []
              tips = []
              lines = text.splitlines()

              # 1. Code blocks missing language tag
              bare_fences = [i+1 for i, l in enumerate(lines)
                             if re.match(r"^```\s*$", l)]
              if bare_fences:
                  tip = ("建议为代码块添加语言标签（如` ```bash `、` ```yaml `），方便读者识别和语法高亮。"
                         if lang == "zh" else
                         "Add a language tag to fenced code blocks (e.g. ` ```bash `, ` ```yaml `) for syntax highlighting and readability.")
                  tips.append(tip)

              # 2. Very long paragraphs (>200 chars in a single line, not code/table)
              long_paras = [i+1 for i, l in enumerate(lines)
                            if len(l) > 200 and not l.startswith("|") and not l.startswith(" ") and not l.startswith("```")]
              if long_paras:
                  tip = ("部分段落过长（超过200字符），建议适当断句或拆分为列表，提升可读性。"
                         if lang == "zh" else
                         "Some paragraphs are very long (>200 chars). Consider breaking them into shorter sentences or bullet lists for readability.")
                  tips.append(tip)

              # 3. Missing frontmatter
              if not text.startswith("---"):
                  tip = ("文档缺少 frontmatter（`---` 块），建议补充 `sidebar_position` 等元数据。"
                         if lang == "zh" else
                         "Document is missing frontmatter (`---` block). Consider adding `sidebar_position` and other metadata.")
                  tips.append(tip)

              # 4. No introductory paragraph before first subsection
              heading_lines = [(i, l) for i, l in enumerate(lines) if re.match(r"^#{1,2} ", l)]
              if len(heading_lines) >= 2:
                  first_h, second_h = heading_lines[0][0], heading_lines[1][0]
                  between = [l.strip() for l in lines[first_h+1:second_h] if l.strip() and not l.startswith("#")]
                  if not between:
                      tip = ("顶级章节后缺少引导性说明段落，建议在第一个小节前加一两句概述，帮助读者理解上下文。"
                             if lang == "zh" else
                             "No introductory paragraph found before the first subsection. Add a brief overview to orient the reader.")
                      tips.append(tip)

              # 5. Admonition / note blocks missing (no NOTE/WARNING/TIP patterns)
              has_admonition = bool(re.search(r"(> ?(注意|警告|提示|NOTE|WARNING|TIP|CAUTION))", text))
              total_headings = len(heading_lines)
              if total_headings >= 4 and not has_admonition:
                  tip = ("文档内容较多但未使用任何提示框（如 `> 注意：`），对关键注意事项建议使用 blockquote 或 admonition 标注。"
                         if lang == "zh" else
                         "No callouts (NOTE / WARNING / TIP) found in a multi-section document. Consider highlighting critical information with blockquotes or admonition syntax.")
                  tips.append(tip)

              # 6. Tables without header separator
              for i, l in enumerate(lines):
                  if l.startswith("|") and i+1 < len(lines):
                      if not re.match(r"^\|[-| :]+\|", lines[i+1]):
                          tip = ("部分表格缺少分隔行（`|---|`），可能导致渲染异常，请检查表格格式。"
                                 if lang == "zh" else
                                 "A table appears to be missing its header separator row (`|---|`). This may cause rendering issues.")
                          tips.append(tip)
                          break

              # 7. Relative links check
              broken_links = re.findall(r"\[.*?\]\((?!http)(.*?)\)", text)
              for link in broken_links:
                  target = os.path.join(os.path.dirname(path), link)
                  if not os.path.exists(target):
                      tip = (f"相对链接 `{link}` 指向的文件可能不存在，请检查路径是否正确。"
                             if lang == "zh" else
                             f"Relative link `{link}` may point to a non-existent file. Please verify the path.")
                      tips.append(tip)
                      break  # report once per file

              return tips[:5]  # cap at 5

          # ── Build suggestions block ───────────────────────────────────────────
          out = ["\n\n<!-- bilingual-docs-suggestions -->",
                 "## 💡 Doc Engineering Suggestions\n",
                 "_Up to 5 suggestions per language for changed files in this PR._\n"]

          any_suggestion = False

          for f in zh_files:
              if not os.path.exists(f):
                  continue
              tips = analyse(f, "zh")
              if tips:
                  any_suggestion = True
                  out.append(f"### `{f}` （中文）\n")
                  for t in tips:
                      out.append(f"- {t}")
                  out.append("")

          for f in en_files:
              if not os.path.exists(f):
                  continue
              tips = analyse(f, "en")
              if tips:
                  any_suggestion = True
                  out.append(f"### `{f}` (English)\n")
                  for t in tips:
                      out.append(f"- {t}")
                  out.append("")

          if not any_suggestion:
              out.append("No structural suggestions — documents look well-formed. ✅\n")

          suggestions = "\n".join(out)
          print(suggestions)

          # Append to existing report
          with open("/tmp/report.md", "a") as f:
              f.write(suggestions)
          PYEOF

      - name: Post comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const marker = '<!-- bilingual-docs-check -->';

            // Find and update existing comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            const fullBody = marker + '\n' + body;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
